<div class="login-bg">
  <div class="glass-card">
    <div class="login-logo">
      <h1>NAF NAF</h1>
      <p>Sales Intelligence Platform</p>
    </div>

    <div class="login-form">
      <div class="field">
        <input
          pInputText
          [(ngModel)]="username"
          placeholder="Username"
        />
      </div>

      <div class="field">
        <p-password
          [(ngModel)]="password"
          [feedback]="false"
          placeholder="Password"
          [toggleMask]="true"
        />
      </div>

      @if (errorMessage) {
        <div style="color: #ff4444; font-size: 0.85rem; text-align: center;">
          {{ errorMessage }}
        </div>
      }

      <p-button
        [label]="loading ? 'Signing in...' : 'Sign In'"
        (onClick)="onLogin()"
        [disabled]="loading"
      />

    </div>
  </div>
</div>
